[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".venv",
    "*/migrations/*",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # black é source-of-truth de linha longa
    "B008",  # do not perform function calls in argument defaults (DRF patterns)
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401", "F811"]
"core/settings/*.py" = ["F403", "F405"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "core.settings.dev"
addopts = "--reuse-db --cov=. --cov-report=term-missing --no-cov-on-fail"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    migrations
)/
'''
